name: CI

env:
  CARGO_TERM_COLOR: always
  MSRV: "1.85"

on:
  push:
    branches:
      - main
  pull_request: {}

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all --check

  deny:
    name: Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: rust/Cargo.toml

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Clippy (all features)
        run: cargo clippy --all-targets --all-features -- -D warnings
      # Guard the data-contract-only build Synapse uses (no async, no store backend).
      - name: Clippy (no default features)
        run: cargo clippy --all-targets --no-default-features -- -D warnings

  test:
    name: Test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    strategy:
      matrix:
        rust: [stable, beta]
    steps:
      - uses: actions/checkout@v5
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Run tests (all features)
        run: cargo test --all-targets --all-features
      # Guard the data-contract-only build Synapse uses (no async, no store backend).
      - name: Run tests (no default features)
        run: cargo test --all-targets --no-default-features

  test-msrv:
    name: Test (MSRV 1.85)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Run tests (all features)
        run: cargo test --all-targets --all-features
      - name: Run tests (no default features)
        run: cargo test --all-targets --no-default-features

  docs:
    name: Docs
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v5
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - name: Check docs
        run: cargo doc --no-deps --all-features
        env:
          RUSTDOCFLAGS: "-D warnings"

  python:
    name: Python (cross-language contract)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install protoc
        run: sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          save-if: ${{ github.ref == 'refs/heads/main' }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint (ruff)
        run: |
          ruff check scripts/
          ruff format --check scripts/
      # The reason the payload is Protobuf and not MessagePack (CORTEX.md §4):
      # proves Rust and Python encode/decode byte-identical bytes, floats included.
      - name: Cross-language round-trip
        run: python scripts/check_roundtrip.py
