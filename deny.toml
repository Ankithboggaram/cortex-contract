[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "BSL-1.0",              # Boost Software License; permissive
    "CDLA-Permissive-2.0",  # permissive data license
    "Unlicense",
]

[bans]
# Warn on duplicate crate versions rather than hard-failing; some version skew
# is unavoidable while transitive dependencies catch up.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"

[advisories]
# "all" checks every crate in the dependency tree.
unmaintained = "all"
yanked = "deny"
# Advisory ignores are added here (with justification) only if cargo-deny flags
# a transitive advisory we cannot yet resolve. None at scaffold time.
ignore = []
