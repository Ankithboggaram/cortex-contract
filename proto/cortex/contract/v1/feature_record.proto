syntax = "proto3";

package cortex.contract.v1;

// The canonical feature payload. See PRD.md §3 and CORTEX.md §4.
//
// The `features` array order is governed by feature_schema.toml: index N here ==
// the Nth `[[feature]]` entry there. This same record is the `features` Kafka topic
// value, the online-store value, and (expanded to columns) the offline Parquet row.
//
// Generated into Rust via prost (build.rs) and Python via protoc. one definition,
// every language. `float` is unambiguously 32-bit.
message FeatureRecord {
  // Which feature schema this vector was produced under (feature_schema.toml `version`).
  // Axon rejects a record whose schema_version != the model's trained version.
  uint32 schema_version = 1;

  // Source event time in epoch millisecond. The basis for freshness everywhere
  // (Dendrite measures event->write; Axon measures now - event_time_ms at serve time).
  int64 event_time_ms = 2;

  // The feature vector, f32, in canonical schema order. len() must equal the
  // schema width (Axon rejects a mismatch; it never pads or truncates).
  repeated float features = 3;
}
