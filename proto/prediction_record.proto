syntax = "proto3";

package cortex.contract.v1;

// Emitted by Axon for every served prediction (async, fire-and-forget, off the
// hot path). See PRD.md §3.2 and CORTEX.md §10. A thin predictions-sink lands
// these in the offline store next to features; joined later with delayed labels
// they become the retraining dataset, the drift-detection input, and the
// shadow-comparison basis. Protobuf so Python monitoring + Synapse read it without drift.
message PredictionRecord {
  string entity_id = 1;

  // Which model produced this prediction.
  string model_name = 2;
  string model_version = 3;

  // The feature schema the model saw (must match FeatureRecord.schema_version).
  uint32 schema_version = 4;

  // Source event time of the features used (epoch ms).
  int64 event_time_ms = 5;
  // When the prediction was made (epoch ms).
  int64 predict_time_ms = 6;

  // The exact input vector served, in canonical schema order.
  repeated float features = 7;
  // Model output (score / class probabilities).
  repeated float output = 8;

  // Correlation / de-duplication id.
  string request_id = 9;
}
